name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Soft review: do not block merges if Gemini fails
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure API key is configured
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::Missing GEMINI_API_KEY secret. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Fetch PR diff
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" > pr.diff
          if [ ! -s pr.diff ]; then
            echo "Empty diff; nothing to review."
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          else
            wc -c pr.diff
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Review with Gemini
        if: steps.diff.outputs.has_diff == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          PR_DIFF_PATH: pr.diff
        run: python3 .github/scripts/gemini_pr_review.py
